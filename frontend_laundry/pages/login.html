<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Barokah Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            margin: 0;
            padding: 20px;
        }
        .login-card { 
            max-width: 400px; 
            width: 100%; 
            border: none;
        }
        .brand-title {
            font-family: 'Federo', sans-serif;
            color: var(--earthy-teal);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="card login-card p-4 shadow">
        <div class="text-center mb-4">
            <h1 class="brand-title">Barokah Laundry</h1>
            <p class="text-muted">Silakan masuk untuk melanjutkan</p>
        </div>
        
        <form id="formLogin">
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Masukkan username" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <input type="password" id="password" class="form-control" placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Masuk Sekarang</button>
        </form>
    </div>

    <script src="../js/api.js"></script>
    <script>
    document.getElementById('formLogin').onsubmit = async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch(`${BASE_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await res.json();
            
            if (res.ok) {
                // 1. Simpan status login
                sessionStorage.setItem('isLoggedIn', 'true');

                // 2. Cek apakah ada halaman tujuan yang tersimpan di api.js tadi
                const destination = sessionStorage.getItem('redirectAfterLogin');

                if (destination) {
                    // Jika ada, hapus catatan dan pergi ke sana
                    sessionStorage.removeItem('redirectAfterLogin');
                    window.location.href = destination;
                } else {
                    // Jika tidak ada catatan (login manual), ke halaman input
                    window.location.href = 'index.html';
                }
            } else {
                alert(result.message || "Login Gagal");
            }
        } catch (error) {
            alert("Tidak dapat terhubung ke server. Pastikan server API menyala.");
        }
    };
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
