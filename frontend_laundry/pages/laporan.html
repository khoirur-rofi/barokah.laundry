<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan - Barokah Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Barokah Laundry</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">Input Cucian</a>
                    <a class="nav-link" href="edit.html">Edit Cucian</a>
                    <a class="nav-link" href="riwayat.html">Riwayat</a>
                    <a class="nav-link active" href="laporan.html">Laporan</a>
                    <a class="nav-link" href="profil.html">Profil</a>
                    <button class="btn btn-danger btn-sm ms-lg-3" onclick="prosesKeluar()">Keluar</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                
                <div class="card p-3 mb-4 shadow-sm border-0 border-start border-primary border-4">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <label class="form-label small mb-1 fw-bold text-muted">Harga Per Kilogram saat ini</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white">Rp</span>
                                <input type="number" id="inputHargaKilo" class="form-control" placeholder="Memuat harga...">
                                <button class="btn btn-primary" onclick="simpanHargaKilo()">Update Harga</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card p-4 mb-4 shadow-sm border-0">
                    <h5 class="mb-3 fw-bold">Filter Periode Laporan</h5>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Dari Tanggal</label>
                            <input type="date" id="lap-mulai" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Sampai Tanggal</label>
                            <input type="date" id="lap-selesai" class="form-control">
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button onclick="loadLaporan()" class="btn btn-success w-100 fw-bold">Cek Pendapatan</button>
                        </div>
                    </div>
                </div>

                <div id="hasil-laporan" class="text-center d-none"> 
                    <div class="card bg-white p-5 shadow-sm border-0">
                        
                        <div class="row mb-4">
                            <div class="col-md-6 border-end">
                                <h5 class="text-muted fw-light">Pendapatan Laki-laki</h5>
                                <h2 class="fw-bold text-primary" id="total-laki">Rp 0</h2>
                            </div>
                            <div class="col-md-6">
                                <h5 class="text-muted fw-light">Pendapatan Perempuan</h5>
                                <h2 class="fw-bold text-danger" id="total-perempuan">Rp 0</h2>
                            </div>
                        </div>
                        
                        <hr class="text-muted mb-4">

                        <h4 class="text-muted fw-light">Total Pendapatan Keseluruhan</h4>
                        <h1 class="display-4 mt-2 fw-bold text-success" id="total-pendapatan">Rp 0</h1>
                        
                        <p class="mb-0 text-muted mt-3">
                            Berdasarkan transaksi yang sudah <span class="badge bg-success">Lunas</span> pada periode terpilih
                        </p>
                    </div>
                </div>
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        cekLogin();
    </script>
    <script src="../js/laporan.js"></script>
    
    <script>
        // Fungsi untuk mengambil harga saat halaman pertama kali dibuka
        async function muatHargaSaatIni() {
            try {
                const res = await fetch(`${BASE_URL}/cucian/pengaturan/harga`);
                const data = await res.json();
                if (data.harga) {
                    document.getElementById('inputHargaKilo').value = data.harga;
                }
            } catch (error) {
                console.error("Gagal mengambil harga:", error);
            }
        }

        // Jalankan fungsi muat harga
        muatHargaSaatIni();
    </script>
</body>
</html>
