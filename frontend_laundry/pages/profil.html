<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil Admin - Barokah Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Barokah Laundry</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">Input Cucian</a>
                    <a class="nav-link" href="edit.html">Edit Cucian</a>
                    <a class="nav-link" href="riwayat.html">Riwayat</a>
                    <a class="nav-link" href="laporan.html">Laporan</a>
                    <a class="nav-link active" href="profil.html">Profil</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h4 class="mb-4 text-center">Pengaturan Akun Admin</h4>
                    
                    <form id="formProfil">
                        <div class="bg-light p-3 rounded mb-4 border">
                            <h6 class="text-primary mb-3 fw-bold">1. Verifikasi Data Lama</h6>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Username Saat Ini</label>
                                <input type="text" id="old-username" class="form-control" placeholder="Username lama" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Password Saat Ini</label>
                                <input type="password" id="old-password" class="form-control" placeholder="Password lama" required>
                            </div>
                        </div>

                        <div class="p-2 mb-3">
                            <h6 class="text-success mb-3 fw-bold">2. Data Akses Baru</h6>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Username Baru</label>
                                <input type="text" id="new-username" class="form-control" placeholder="Buat username baru" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Password Baru</label>
                                <input type="password" id="new-password" class="form-control" placeholder="Buat password baru" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                            <button type="button" class="btn btn-outline-danger" onclick="logout()">Keluar / Logout</button>
                        </div>
                    </form>
                </div>
                <p class="text-center text-muted mt-3 small">Setelah simpan, Anda akan otomatis logout.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        // Jalankan proteksi halaman segera setelah api.js dimuat
        cekLogin();
    </script>
    <script src="../js/profil.js"></script>
    <script>
        function logout() {
            if(confirm("Apakah Anda yakin ingin keluar?")) {
                sessionStorage.removeItem('isLoggedIn');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
