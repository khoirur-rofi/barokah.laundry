<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edit - Barokah Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* CSS Tambahan untuk memastikan konsistensi tombol */
        .btn-action {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 0.9rem;
            padding: 0 15px;
            line-height: 1;
        }
        .btn-soft-primary {
            background-color: #e7f1ff;
            color: #0d6efd;
            border: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Barokah Laundry</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">Input Cucian</a>
                    <a class="nav-link active" href="edit.html">Edit Cucian</a>
                    <a class="nav-link" href="riwayat.html">Riwayat</a>
                    <a class="nav-link" href="laporan.html">Laporan</a>
                    <a class="nav-link" href="profil.html">Profil</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                
                <div class="card p-3 mb-4 shadow-sm border-0" style="border-radius: 15px;">
                    <h6 class="mb-3 fw-bold"><i class="bi bi-filter-left"></i> Filter Data</h6>
                    <div class="row g-2">
                        <div class="col-md-4">
                            <input type="text" id="filterNama" class="form-control" placeholder="Cari Nama Santri...">
                        </div>
                        <div class="col-md-3">
                            <input type="text" id="filterKamar" class="form-control" placeholder="Kamar...">
                        </div>
                        <div class="col-md-3">
                            <input type="date" id="filterTanggal" class="form-control">
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-secondary w-100" onclick="resetFilter()">Reset</button>
                        </div>
                    </div>
                </div>

                <div class="card p-4 mb-4 shadow-sm border-0" style="border-radius: 15px;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h5 class="mb-0 fw-bold text-dark">Daftar Transaksi</h5>
                            <small class="text-muted">Mode koreksi dan hapus data</small>
                        </div>
                        <span class="badge bg-warning text-dark px-3 py-2" style="border-radius: 8px;">
                            <i class="bi bi-info-circle"></i> Klik Edit untuk aksi
                        </span>
                    </div>
                    
                    <div id="edit-grid" class="row g-3">
                        <div class="col-12 text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2 text-muted">Memuat data...</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEdit" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-primary"><i class="bi bi-pencil-square"></i> Edit Transaksi</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditCucian">
                        <input type="hidden" id="edit-id">
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">Nama Santri</label>
                            <input type="text" id="edit-nama" class="form-control bg-light" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold text-secondary">Kamar</label>
                                <input type="text" id="edit-kamar" class="form-control bg-light" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold text-secondary">Berat (Kg)</label>
                                <input type="number" id="edit-berat" step="0.1" class="form-control bg-light" required>
                            </div>
                        </div>

                        <hr class="text-muted opacity-25">
                        
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="fw-bold small mb-0"><i class="bi bi-plus-circle"></i> Item Tambahan</h6>
                            <button type="button" onclick="tambahBarisItemEdit()" class="btn btn-sm btn-soft-primary px-3">
                                <i class="bi bi-plus"></i> Tambah
                            </button>
                        </div>
                        
                        <div id="container-edit-tambahan" class="mb-4">
                        </div>

                        <div class="row g-2 mt-3 align-items-stretch">
                            <div class="mt-4">
    <button type="submit" 
            class="btn btn-primary w-100 d-flex align-items-center justify-content-center shadow-sm fw-bold" 
            style="height: 48px; border-radius: 12px; font-size: 1rem;">
        <i class="bi bi-check-lg me-2"></i> Simpan Perubahan
    </button>
</div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/edit.js"></script>
</body>
</html>
