<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Input Cucian - Barokah Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Barokah Laundry</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active" href="index.html">Input Cucian</a>
                    <a class="nav-link" href="pages/edit.html">Edit Cucian</a>
                    <a class="nav-link" href="pages/riwayat.html">Riwayat</a>
                    <a class="nav-link" href="pages/laporan.html">Laporan</a>
                    <a class="nav-link" href="pages/profil.html">Profil</a>
                    </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h4 class="mb-4 text-center">Form Input Cucian Baru</h4>
                    <form id="formCucian">
                        <div class="row mb-3 position-relative">
                            <div class="col-md-6">
                                <label class="form-label">Nama Santri</label>
                                <input type="text" id="nama" class="form-control" placeholder="Ketik nama..." autocomplete="off" required>
                                <div id="saran-nama" class="list-group d-none"></div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Kamar</label>
                                <input type="text" id="kamar" class="form-control" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Gender</label>
                                <select id="gender" class="form-select" required>
                                    <option value="L">Laki-laki (L)</option>
                                    <option value="P">Perempuan (P)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Berat Cucian (Kg)</label>
                            <input type="number" id="berat" class="form-control" step="0.1" placeholder="Contoh: 2.5" required>
                        </div>

                        <hr>
                        <h5 class="mb-3">Item Tambahan (Opsional)</h5>
                        <div id="container-tambahan"></div>
                        
                        <button type="button" id="btnTambahItem" class="btn btn-outline-primary btn-sm mb-4">
                            + Tambah Item (Selimut/Sepatu)
                        </button>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">Simpan Transaksi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/santri.js"></script>
    <script src="js/cucian.js"></script>

    </body>
</html>
